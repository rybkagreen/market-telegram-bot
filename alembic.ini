# Alembic Config file
[alembic]
# Путь к скрипту миграции
script_location = src/db/migrations

# Префикс для файлов миграции
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Путь к моделям для autogenerate
prepend_sys_path = .

# URL базы данных (переопределяется в env.py)
sqlalchemy.url = driver://user:pass@localhost/dbname

# Timezone для миграций
timezone = UTC

# Кодировка
encoding = utf-8

# Output encoding
output_encoding = utf-8

# Максимальная длина имени (PostgreSQL limit)
truncate_slug_length = 40

# Разделитель для версий
version_table_separator = _

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
