sonar.projectKey=market-telegram-bot
sonar.projectName=Market Telegram Bot
sonar.projectVersion=4.3

# Sources
sonar.sources=src,mini_app/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/__pycache__/**,**/migrations/**,**/tests/**,**/*.min.js,**/venv/**

# Tests
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Python
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml

# TypeScript/JavaScript (coverage will be added when frontend tests are implemented)
# sonar.javascript.lcov.reportPaths=mini_app/coverage/lcov.info
sonar.typescript.tsconfigPath=mini_app/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true
