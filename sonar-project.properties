# ══════════════════════════════════════════════════════════════
# SonarQube Configuration — RekHarborBot v4.5 (AAA Standard)
# Last updated: 2026-04-10 (Python 3.14 upgrade)
# ══════════════════════════════════════════════════════════════

# ── Project Identity ──────────────────────────────────────────
sonar.projectKey=market-telegram-bot
sonar.projectName=RekHarborBot
sonar.projectVersion=4.5

# ── Source Scope (4 sub-projects) ─────────────────────────────
sonar.sources=src,mini_app/src,web_portal/src,landing

# ── Exclusions ────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/.venv/**,\
  **/venv/**,\
  **/coverage*/**,\
  **/htmlcov/**,\
  **/migrations/versions/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/schema_dump.sql,\
  **/telethon_session.txt

# ── Test Scope ────────────────────────────────────────────────
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# ── Python (Backend) ─────────────────────────────────────────
sonar.python.version=3.14
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results/pytest/*.xml

# ── TypeScript (Mini App + Web Portal + Landing) ──────────────
sonar.typescript.tsconfigPaths=mini_app/tsconfig.app.json,web_portal/tsconfig.app.json,landing/tsconfig.json
sonar.javascript.lcov.reportPaths=mini_app/coverage/lcov.info,web_portal/coverage/lcov.info,landing/coverage/lcov.info

# ── Encoding ──────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Quality Gate ──────────────────────────────────────────────
sonar.qualitygate.wait=true

# ── Duplication Exclusions (generated/boilerplate) ────────────
sonar.cpd.exclusions=\
  **/migrations/versions/**,\
  **/types/*.ts,\
  **/lib/types.ts,\
  **/*.d.ts

# ── Issue Suppression (AAA: minimal, justified) ───────────────

# S3776: Cognitive complexity — acceptable for complex business logic
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=src/**/*.py

# S1172: Unused function parameters — intentional in stub providers
sonar.issue.ignore.multicriteria=e2
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.e2.resourceKey=src/core/services/stub_ord_provider.py

# S2208: No wildcard import — migration env.py uses Alembic convention
sonar.issue.ignore.multicriteria=e3
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S2208
sonar.issue.ignore.multicriteria.e3.resourceKey=src/db/migrations/env.py

# S4787: Hardcoded encryption algorithm — AES-GCM is intentional
sonar.issue.ignore.multicriteria=e4
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S4787
sonar.issue.ignore.multicriteria.e4.resourceKey=src/core/security/field_encryption.py
