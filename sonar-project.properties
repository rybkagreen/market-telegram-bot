sonar.projectKey=market-telegram-bot
sonar.projectName=Market Telegram Bot
sonar.projectVersion=4.3

# Sources — all three projects
sonar.sources=src,mini_app/src,web_portal/src
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/migrations/versions/**,\
  **/tests/**,\
  **/*.min.js,\
  **/venv/**,\
  **/.venv/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Tests
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Python
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml

# TypeScript/JavaScript
sonar.javascript.lcov.reportPaths=
sonar.typescript.tsconfigPaths=mini_app/tsconfig.json,web_portal/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true

# Suppress S3776 (cognitive complexity) for known complex functions
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=src/**/*.py
