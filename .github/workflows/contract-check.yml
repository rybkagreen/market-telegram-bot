name: Contract check

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  contract-drift:
    name: Contract drift + grep-guards + API unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      # FIX_PLAN_06 §6.4 — grep-guards: forbidden TS patterns
      - name: Grep-guards (forbidden regression patterns)
        run: bash scripts/check_forbidden_patterns.sh

      # FIX_PLAN_06 §6.1 — contract-drift snapshots (Variant B)
      - name: Contract drift snapshots (Pydantic response schemas)
        run: poetry run pytest tests/unit/test_contract_schemas.py --no-cov

      # FIX_PLAN_06 §6.5 + §6.6 — unit API tests (admin payouts, placement PATCH)
      - name: API unit tests (admin payouts + unified placement PATCH)
        run: poetry run pytest tests/unit/api/ --no-cov
