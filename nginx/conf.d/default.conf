# ══════════════════════════════════════════════════════════════
# Upstream backends
# ══════════════════════════════════════════════════════════════

upstream api_backend {
    server api:8001;
}

upstream flower_backend {
    server flower:5555;
    # resolver is set at http level for dynamic DNS
    # flower is optional - nginx won't fail if unavailable
}

# ══════════════════════════════════════════════════════════════
# HTTP → HTTPS redirect (все домены)
# ══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name rekharbor.ru www.rekharbor.ru app.rekharbor.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════
# HTTPS: app.rekharbor.ru — Telegram Mini App
# ══════════════════════════════════════════════════════════════

server {
    listen 443 ssl;
    http2 on;
    server_name app.rekharbor.ru;

    # SSL (общий сертификат)
    ssl_certificate /etc/letsencrypt/live/rekharbor.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rekharbor.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Mini App корень — SPA из /usr/share/nginx/html/app/
    root /usr/share/nginx/html/app;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # SPA fallback — все пути → index.html
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/conf.d/security_headers_app.conf;
    }

    # Кэш для хешированных assets (Vite добавляет hash в имена файлов)
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|png|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/security_headers_app.conf;
    }

    # index.html — НЕ кэшировать (SPA entry point)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/conf.d/security_headers_app.conf;
    }

    # API proxy → FastAPI
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # YooKassa webhook
    location /webhooks/yookassa {
        proxy_pass http://api_backend/api/billing/webhooks/yookassa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        include /etc/nginx/conf.d/security_headers_app.conf;
    }
}

# ══════════════════════════════════════════════════════════════
# HTTPS: rekharbor.ru — основной сайт (будущее) + API + Flower
# ══════════════════════════════════════════════════════════════

server {
    listen 443 ssl;
    http2 on;
    server_name rekharbor.ru www.rekharbor.ru;

    # SSL
    ssl_certificate /etc/letsencrypt/live/rekharbor.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rekharbor.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Placeholder — будущий сайт
    location / {
        return 200 '<!DOCTYPE html><html><head><meta charset=utf-8><title>RekHarborBot</title></head><body style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0b0e14;color:#e8ecf4;font-family:system-ui"><div style="text-align:center"><div style="font-size:64px">⚓</div><h1>RekHarborBot</h1><p style="color:#7a8599">Скоро здесь будет рекламная биржа Telegram-каналов</p><a href="https://t.me/RekharborBot" style="color:#0ea5e9;margin-top:16px;display:inline-block">Открыть бота →</a></div></body></html>';
        add_header Content-Type text/html;
        include /etc/nginx/conf.d/security_headers_main.conf;
    }

    # API
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Flower мониторинг
    location /flower/ {
        proxy_pass http://flower_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # YooKassa webhook
    location /webhooks/yookassa {
        proxy_pass http://api_backend/api/billing/webhooks/yookassa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        include /etc/nginx/conf.d/security_headers_main.conf;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        include /etc/nginx/conf.d/security_headers_main.conf;
    }
}
