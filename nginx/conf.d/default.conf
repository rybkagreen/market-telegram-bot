# FastAPI backend — имя сервиса "api" согласно docker-compose.yml
upstream api_backend {
    server api:8001;
}

# Flower monitoring
upstream flower_backend {
    server flower:5555;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    # Gzip сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Mini App — React SPA
    # Статика лежит в /usr/share/nginx/html/app/
    location /app/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /app/index.html;
        
        # Кэш для хешированных assets (1 год)
        location ~* ^/app/assets/.*\.(js|css|woff2?|ttf|png|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # index.html не кэшировать
        location = /app/index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # API для Mini App
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Flower мониторинг Celery
    location /flower/ {
        proxy_pass http://flower_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
