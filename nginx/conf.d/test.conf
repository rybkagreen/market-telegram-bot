# ══════════════════════════════════════════════════════════════
# Test-only nginx config — served on port 80, no SSL.
# Used ONLY by docker-compose.test.yml.
# ══════════════════════════════════════════════════════════════

upstream api_backend {
    server api-test:8001;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10M;

    # ─── Web Portal SPA (served at root) ───
    root /usr/share/nginx/html/portal;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 1000;

    # Hashed assets — long cache
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|png|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — no cache
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API proxy → FastAPI test instance
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /api/health {
        proxy_pass http://api_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Health
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — React Router client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
