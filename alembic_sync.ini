# Alembic Config file для sync операций (создание миграций)
[alembic]
script_location = src/db/migrations
prepend_sys_path = .
timezone = UTC
encoding = utf-8
output_encoding = utf-8
truncate_slug_length = 40
version_table_separator = _

# Используем sync env.py вместо async
env_module = env_sync

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
