version: "3.8"

services:
  # PostgreSQL — база данных
  postgres:
    image: postgres:16-alpine
    container_name: market_bot_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-market_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-market_bot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-market_bot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market_bot} -d ${POSTGRES_DB:-market_bot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - market_bot_network

  # Redis — кэш и брокер для Celery
  redis:
    image: redis:7-alpine
    container_name: market_bot_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - market_bot_network

  # Bot — aiogram бот (polling для разработки)
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    env_file:
      - .env
    container_name: market_bot_bot
    environment:
      ENVIRONMENT: development
      BOT_TOKEN: 7562867307:AAEIzuEqqRDV0kixpFHXIpVDgxaq0Xq_F_k
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      API_ID: ${API_ID}
      API_HASH: ${API_HASH}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      ADMIN_IDS: ${ADMIN_IDS}
      AI_COST_PER_GENERATION: ${AI_COST_PER_GENERATION:-10}
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini:ro
      - ./alembic_sync.ini:/app/alembic_sync.ini:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    command: poetry run python -m src.bot.main

  # Worker — Celery worker
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_worker
    environment:
      ENVIRONMENT: development
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      API_ID: ${API_ID}
      API_HASH: ${API_HASH}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      ADMIN_IDS: ${ADMIN_IDS}
      AI_COST_PER_GENERATION: ${AI_COST_PER_GENERATION:-10}
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    command: celery -A src.tasks.celery_app worker --loglevel=info -Q mailing,parser,cleanup
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.tasks.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery Beat — планировщик задач
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_celery_beat
    environment:
      ENVIRONMENT: development
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      API_ID: ${API_ID}
      API_HASH: ${API_HASH}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      ADMIN_IDS: ${ADMIN_IDS}
      AI_COST_PER_GENERATION: ${AI_COST_PER_GENERATION:-10}
    volumes:
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    networks:
      - market_bot_network
    command: celery -A src.tasks.celery_app beat --loglevel=info

  # Flower — мониторинг Celery
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - worker
    networks:
      - market_bot_network
    command: celery -A src.tasks.celery_app flower --port=5555

  # API — FastAPI для Mini App
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: market_bot_api
    environment:
      ENVIRONMENT: development
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      API_ID: ${API_ID}
      API_HASH: ${API_HASH}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      AI_COST_PER_GENERATION: ${AI_COST_PER_GENERATION:-10}
    volumes:
      - ./src:/app/src
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    command: poetry run uvicorn src.api.main:app --host 0.0.0.0 --port 8001 --reload

  # Nginx — reverse proxy
  nginx:
    image: nginx:alpine
    container_name: market_bot_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:ro
      - ./mini_app/dist:/app/static:ro
    depends_on:
      - bot
      - api
    networks:
      - market_bot_network

networks:
  market_bot_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
