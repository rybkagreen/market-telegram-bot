version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: market_bot_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-market_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-market_bot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-market_bot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market_bot} -d ${POSTGRES_DB:-market_bot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - market_bot_network

  redis:
    image: redis:7
    container_name: market_bot_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - market_bot_network

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: market_bot_worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    networks:
      - market_bot_network
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: market_bot_celery_worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      - REDIS_URL=redis://redis:6379/0
    command: celery -A src.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    networks:
      - market_bot_network
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: market_bot_celery_beat
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      - REDIS_URL=redis://redis:6379/0
    command: celery -A src.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    networks:
      - market_bot_network
    restart: unless-stopped

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: market_bot_api
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      - REDIS_URL=redis://redis:6379/0
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    networks:
      - market_bot_network
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: market_bot_flower
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    command: celery -A src.celery_app flower --port=5555
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    networks:
      - market_bot_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: market_bot_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - fastapi
      - flower
    networks:
      - market_bot_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  market_bot_network:
    driver: bridge
