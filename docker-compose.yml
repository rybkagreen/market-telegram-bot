# docker-compose.yml
# ══════════════════════════════════════════════════════════════
# Все секреты хранятся в .env (не коммитить в git!)
# Шаблон: .env.example
# ══════════════════════════════════════════════════════════════

services:

  postgres:
    image: postgres:16-alpine
    container_name: market_bot_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-market_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-market_bot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-market_bot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market_bot} -d ${POSTGRES_DB:-market_bot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - market_bot_network

  redis:
    image: redis:7-alpine
    container_name: market_bot_redis
    command: redis-server --appendonly yes
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - market_bot_network

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: market_bot_bot
    env_file: .env
    environment:
      # Переопределяем только хосты (localhost → имена сервисов Docker)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini:ro
      - ./alembic_sync.ini:/app/alembic_sync.ini:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    restart: unless-stopped
    command: poetry run python -m src.bot.main

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    restart: unless-stopped
    command: celery -A src.tasks.celery_app worker --loglevel=info -Q mailing,parser,cleanup -E
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.tasks.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_celery_beat
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    networks:
      - market_bot_network
    restart: unless-stopped
    command: celery -A src.tasks.celery_app beat --loglevel=info

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_flower
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      - worker
    networks:
      - market_bot_network
    command: celery -A src.tasks.celery_app flower --port=5555

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: market_bot_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    ports:
      - "${API_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    command: poetry run uvicorn src.api.main:app --host 0.0.0.0 --port 8001 --reload

  # ══════════════════════════════════════════════════════════════
  # Nginx + Mini App (production build)
  # ══════════════════════════════════════════════════════════════
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: market_bot_nginx
    ports:
      - "8080:80"
    depends_on:
      - bot
      - api
    networks:
      - market_bot_network
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # Cloudflare Tunnel (HTTPS для Mini App)
  # ══════════════════════════════════════════════════════════════
  # Раскомментировать для постоянного туннеля:
  # 1. Создать туннель: cloudflared tunnel create market-bot
  # 2. Получить токен из ~/.cloudflared/market-bot.json
  # 3. Вставить токен в CLOUDFLARE_TUNNEL_TOKEN ниже
  # 4. Запустить: docker compose up -d cloudflared
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: market_bot_cloudflared
  #   command: tunnel run
  #   environment:
  #     - CLOUDFLARE_TUNNEL_TOKEN=YOUR_TOKEN_HERE
  #   networks:
  #     - market_bot_network
  #   restart: unless-stopped

networks:
  market_bot_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
