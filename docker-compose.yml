# docker-compose.yml
# ══════════════════════════════════════════════════════════════
# Все секреты хранятся в .env (не коммитить в git!)
# Шаблон: .env.example
# ══════════════════════════════════════════════════════════════

services:

  postgres:
    image: postgres:16-alpine
    container_name: market_bot_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-market_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-market_bot_pass}
      POSTGRES_DB: ${POSTGRES_DB:-market_bot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"  # Закомментировано для безопасности - доступ только из Docker сети
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market_bot} -d ${POSTGRES_DB:-market_bot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - market_bot_network

  redis:
    image: redis:7-alpine
    container_name: market_bot_redis
    command: redis-server --appendonly yes
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - market_bot_network

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: market_bot_bot
    env_file: .env
    environment:
      # Переопределяем только хосты (localhost → имена сервисов Docker)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
      - ./alembic.docker.ini:/app/alembic.ini:ro
      - ./alembic_sync.ini:/app/alembic_sync.ini:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    restart: unless-stopped
    command: poetry run python -m src.bot.main

  # ══════════════════════════════════════════════════════════════
  # Celery Workers — разделены по приоритетам
  # ══════════════════════════════════════════════════════════════

  # Worker 1: критические задачи — финансы, уведомления, рассылки
  worker_critical:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_worker_critical
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    restart: unless-stopped
    command: celery -A src.tasks.celery_app worker --loglevel=info -Q celery,mailing,notifications,billing -n critical@%h --concurrency=2 -E
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.tasks.celery_app inspect ping -d critical@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Worker 2: фоновые задачи — парсер, очистка, аналитика
  worker_background:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_worker_background
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    restart: unless-stopped
    command: celery -A src.tasks.celery_app worker --loglevel=info -Q parser,cleanup,rating -n background@%h --concurrency=4 -E
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.tasks.celery_app inspect ping -d background@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Worker 3: геймификация — низкий приоритет, может подождать
  worker_game:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_worker_game
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    restart: unless-stopped
    command: celery -A src.tasks.celery_app worker --loglevel=info -Q gamification,badges -n game@%h --concurrency=2 -E
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.tasks.celery_app inspect ping -d game@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_celery_beat
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    restart: unless-stopped
    command: celery -A src.tasks.celery_app beat --loglevel=info

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: market_bot_flower
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      - worker_critical
      - worker_background
      - worker_game
    networks:
      - market_bot_network
    command: celery -A src.tasks.celery_app flower --port=5555

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: market_bot_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./src:/app/src
      - ./alembic.docker.ini:/app/alembic.ini:ro
      - ./alembic_sync.ini:/app/alembic_sync.ini:ro
      - contracts_data:/data/contracts
      - /opt/market-telegram-bot/reports/monitoring/payloads:/tmp/glitchtip_queue
    ports:
      - "${API_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network
    command: poetry run uvicorn src.api.main:app --host 0.0.0.0 --port 8001 --reload

  # ══════════════════════════════════════════════════════════════
  # Nginx + Mini App (production build)
  # ══════════════════════════════════════════════════════════════
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: market_bot_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - bot
      - api
    networks:
      - market_bot_network
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/ssl:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ══════════════════════════════════════════════════════════════
  # Cloudflare Tunnel (HTTPS для Mini App)
  # ══════════════════════════════════════════════════════════════
  # Раскомментировать для постоянного туннеля:
  # 1. Создать туннель: cloudflared tunnel create market-bot
  # 2. Получить токен из ~/.cloudflared/market-bot.json
  # 3. Вставить токен в CLOUDFLARE_TUNNEL_TOKEN ниже
  # 4. Запустить: docker compose up -d cloudflared
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: market_bot_cloudflared
  #   command: tunnel run
  #   environment:
  #     - CLOUDFLARE_TUNNEL_TOKEN=YOUR_TOKEN_HERE
  #   networks:
  #     - market_bot_network
  #   restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # GlitchTip — self-hosted error tracking
  # ══════════════════════════════════════════════════════════════
  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: rekharbor_glitchtip
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}_errors
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-changeme}
      EMAIL_URL: consolemail://
      GLITCHTIP_DOMAIN: http://localhost:8090
      DEFAULT_FROM_EMAIL: errors@rekharbor.ru
      CELERY_WORKER_CONCURRENCY: 2
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network

  glitchtip_worker:
    image: glitchtip/glitchtip:latest
    container_name: rekharbor_glitchtip_worker
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-market_bot}:${POSTGRES_PASSWORD:-market_bot_pass}@postgres:5432/${POSTGRES_DB:-market_bot_db}_errors
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-changeme}
      EMAIL_URL: consolemail://
      GLITCHTIP_DOMAIN: http://localhost:8090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - market_bot_network

networks:
  market_bot_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  contracts_data:
