# ══════════════════════════════════════════════════════════════
# Isolated E2E test stack — runs Playwright against a production-
# like runtime. Never uses prod DB/Redis/secrets.
#
# Usage:
#   make test-e2e
# or manually:
#   docker compose -f docker-compose.test.yml --env-file .env.test up \
#       --build --abort-on-container-exit --exit-code-from playwright
# ══════════════════════════════════════════════════════════════

services:

  postgres-test:
    image: postgres:16-alpine
    container_name: e2e_postgres
    env_file: .env.test
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    tmpfs:
      - /var/lib/postgresql/data  # RAM-backed — fastest, wiped on tear-down
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 15
    networks:
      - e2e_network

  redis-test:
    image: redis:7-alpine
    container_name: e2e_redis
    command: redis-server --save "" --appendonly no
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
    networks:
      - e2e_network

  # One-shot: apply migrations + seed deterministic fixtures
  seed-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: e2e_seed
    env_file: .env.test
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./alembic.docker.ini:/app/alembic.ini:ro
      - ./alembic_sync.ini:/app/alembic_sync.ini:ro
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    networks:
      - e2e_network
    command: >
      sh -c "
        echo '[seed] applying migrations...' &&
        poetry run alembic upgrade head &&
        echo '[seed] seeding fixtures...' &&
        poetry run python /app/scripts/e2e/seed_e2e.py &&
        echo '[seed] done'
      "

  api-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: e2e_api
    env_file: .env.test
    volumes:
      - ./src:/app/src
    depends_on:
      seed-test:
        condition: service_completed_successfully
    networks:
      - e2e_network
    command: poetry run uvicorn src.api.main:app --host 0.0.0.0 --port 8001
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 10s

  nginx-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx-test
    container_name: e2e_nginx
    depends_on:
      api-test:
        condition: service_healthy
    networks:
      - e2e_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10

  playwright:
    build:
      context: .
      dockerfile: docker/Dockerfile.playwright
    container_name: e2e_playwright
    depends_on:
      nginx-test:
        condition: service_healthy
    volumes:
      - ./web_portal/tests:/e2e/tests
      - ./reports/e2e:/e2e/reports
    environment:
      BASE_URL: http://nginx-test
      CI: "true"
    working_dir: /e2e/tests
    networks:
      - e2e_network

  # Pytest-based API contract tests — runs against the same nginx-test.
  # Shares seed fixtures with playwright, so cheap to run as part of the
  # same stack.
  api-contract:
    build:
      context: .
      dockerfile: docker/Dockerfile.api-contract
    container_name: e2e_api_contract
    env_file: .env.test
    depends_on:
      nginx-test:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./reports/e2e:/app/reports
    environment:
      BASE_URL: http://nginx-test
    networks:
      - e2e_network
    working_dir: /app/tests/e2e_api
    command: ["poetry", "run", "pytest", ".", "-c", "pytest.ini", "--junitxml=/app/reports/api-contract-junit.xml"]

networks:
  e2e_network:
    driver: bridge
